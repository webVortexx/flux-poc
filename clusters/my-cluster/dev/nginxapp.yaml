apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginxapp
  namespace: dev
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-nginx
  template:
    metadata:
      labels:
        app: my-nginx
    spec:
      containers:
      - name: nginxcnt
        image: nginx
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-nginx-service
  namespace: dev
spec:
  selector:
    app: my-nginx
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
